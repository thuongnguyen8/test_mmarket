<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chợ MoMoer - Marketplace Nội Bộ MoMo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header class="header">
      <div class="container">
        <div class="header-left">
          <div class="logo-section">
            <div class="logo-wrapper">
              <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%23a50064' width='32' height='32' rx='8'/%3E%3Ctext x='50%25' y='50%25' font-size='18' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'%3E%24%3C/text%3E%3C/svg%3E" alt="MoMo" class="logo-img">
              <span class="logo-badge">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 8h16l-1.5 10a2 2 0 0 1-2 1.7H7.5a2 2 0 0 1-2-1.7L4 8z"></path>
                  <path d="M8 8V6a4 4 0 0 1 8 0v2"></path>
                </svg>
              </span>
            </div>
            <div class="logo-text">
              <span class="cho-badge">Chợ</span>
              <span class="brand-name">MoMoer</span>
            </div>
          </div>
        </div>

        <div class="search-box">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            type="text"
            id="searchInput"
            placeholder="Tìm món ngon, đồ xịn của đồng nghiệp..."
            class="search-input"
          >
        </div>

        <div class="header-right">
          <button class="icon-btn" id="notifBtn" title="Thông báo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M4 19h16v-1l-2-2V9a6 6 0 0 0-12 0v7l-2 2v1z"></path>
              <path d="M10 21a2 2 0 0 0 4 0"></path>
            </svg>
            <span class="notif-badge">3</span>
          </button>
          <button class="btn-primary" id="postBtn">+ Đăng bán/Pass đồ</button>

          <div class="user-menu-wrapper">
            <button class="user-btn" id="userBtn">TN</button>
            <div class="user-menu" id="userMenu">
              <div class="user-info">
                <div class="user-name">Thuộng Nguyễn</div>
                <div class="user-email">thuong@momo.com</div>
              </div>
              <button class="btn-logout" id="logoutBtn">Đăng xuất</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div class="container">
        <!-- HERO -->
        <section class="hero">
          <h1>Đồng nghiệp có gì hay ho, mang hết ra <span class="highlight">ĐÂY</span> thôi!</h1>
          <p>Pass đồ cũ, bán đồ ăn nhà làm, kinh doanh linh tinh — ngay trong nội bộ MoMo.</p>
          <div class="hot-tags" id="hotTags">
            <span class="tag">🔥 Cơm nhà</span>
            <span class="tag">🔥 Đồ cũ</span>
            <span class="tag">🔥 Đầu tư</span>
            <span class="tag">🔥 Thủ công</span>
          </div>
        </section>

        <!-- CATEGORIES -->
        <section class="categories" id="categories">
          <button class="cat-btn active" data-category="all">Tất cả</button>
          <button class="cat-btn" data-category="food">🍜 Đồ ăn</button>
          <button class="cat-btn" data-category="goods">👜 Đồ cũ</button>
          <button class="cat-btn" data-category="service">💼 Dịch vụ</button>
          <button class="cat-btn" data-category="investment">💰 Đầu tư</button>
        </section>

        <!-- FEED -->
        <section class="feed">
          <div class="products-grid" id="productsGrid">
            <!-- Products loaded here by JS -->
          </div>
          <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">🏪</div>
            <div class="empty-title">Chưa có ai bán gì ở đây</div>
            <div class="empty-desc">Bạn làm người mở hàng nhé!</div>
          </div>
        </section>
      </div>
    </main>

    <!-- POST MODAL -->
    <div class="modal" id="postModal">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Đăng bán / Pass đồ</h2>
          <button class="btn-close" id="closePostBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <form class="modal-body" id="postForm">
          <div class="form-group">
            <label>Hình ảnh</label>
            <div class="image-upload">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <path d="M21 15l-5-5L5 21"></path>
              </svg>
              <input type="file" accept="image/*" id="productImage">
              <span>Thêm ảnh sản phẩm</span>
            </div>
          </div>

          <div class="form-group">
            <label>Tên sản phẩm</label>
            <input type="text" id="productName" placeholder="Ví dụ: Cơm chiên dương châu" required>
          </div>

          <div class="form-group">
            <label>Danh mục</label>
            <select id="productCategory" required>
              <option value="">Chọn danh mục</option>
              <option value="food">🍜 Đồ ăn</option>
              <option value="goods">👜 Đồ cũ</option>
              <option value="service">💼 Dịch vụ</option>
              <option value="investment">💰 Đầu tư</option>
            </select>
          </div>

          <div class="form-group">
            <label>Giá (nếu bán)</label>
            <input type="text" id="productPrice" placeholder="VD: 50.000đ hoặc 'Pass'">
          </div>

          <div class="form-group">
            <label>Mô tả</label>
            <textarea id="productDesc" placeholder="Mô tả chi tiết về sản phẩm..." rows="4"></textarea>
          </div>

          <button type="submit" class="btn-primary" style="width: 100%;">Đăng bán</button>
        </form>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
